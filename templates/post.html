{% extends "base.html" %}

{% block title %}{{ post.title }} - Brace Industries{% endblock %}

{% block content %}
<div class="container">
    <article class="post">
        <header class="post-header">
            <h1>{{ post.title }}</h1>
            <time datetime="{{ post.date_iso }}">
                {{ post.date_long }}
            </time>
        </header>

        <div class="post-content">
            {{ post.html_content|safe }}
        </div>

        <footer class="post-footer">
            <a href="{{ base_url }}/writing/" class="back-link">← Back to all posts</a>
        </footer>
    </article>
</div>
{% endblock %}
